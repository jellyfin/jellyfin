<!DOCTYPE html>
<html>
<head>
    <title>Studio Images</title>
</head>
<body>
    <div id="configPage" data-role="page" class="page type-interior pluginConfigurationPage configPage" data-require="emby-input,emby-button,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <h1>Studio Images</h1>
                <form class="configForm">
                    <label class="checkboxContainer">
                        <input is="emby-checkbox" type="checkbox" id="replaceAllImagesOnNextRun" />
                        <span>Replace all studio images on next task run</span>
                    </label>
                    <div class="fieldDescription">When enabled, the next execution of the "Refresh studio artwork" scheduled task will re-apply every studio image from the local artwork bundle, even if the bundle is already up to date. The flag is cleared automatically after the refresh is queued.</div>
                    <br />
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block"><span>Save</span></button>
                    </div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var PluginConfig = {
                pluginId: "872a7849-1171-458d-a6fb-3de3d442ad30"
            };

            document.querySelector('.configPage')
                .addEventListener('pageshow', function () {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(PluginConfig.pluginId).then(function (config) {
                        document.querySelector('#replaceAllImagesOnNextRun').checked = !!config.ReplaceAllImagesOnNextRun;

                        Dashboard.hideLoadingMsg();
                    });
                });

            document.querySelector('.configForm')
                .addEventListener('submit', function (e) {
                    Dashboard.showLoadingMsg();

                    ApiClient.getPluginConfiguration(PluginConfig.pluginId).then(function (config) {
                        config.ReplaceAllImagesOnNextRun = document.querySelector('#replaceAllImagesOnNextRun').checked;

                        ApiClient.updatePluginConfiguration(PluginConfig.pluginId, config).then(Dashboard.processPluginConfigurationUpdateResult);
                    });

                    e.preventDefault();
                    return false;
                });
        </script>
    </div>
</body>
</html>
