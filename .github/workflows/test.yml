name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pyyaml
      - name: Validate configuration files
        run: |
          python -c "import yaml, sys; data = yaml.safe_load(open('config.yaml')); print('Config loaded successfully')"
          python -c "import yaml, sys; data = yaml.safe_load(open('repository.yaml')); print('Repository yaml loaded successfully')"
      - name: Run any existing tests
        run: pytest tests/ --cov=. --cov-report=xml || echo "No pytest tests found, skipping."