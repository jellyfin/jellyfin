name: Project Automation

on:
  push:
    branches:
      - master
  pull_request:
  issue_comment:

permissions:
  repository-projects: write
  issues: write
  pull-requests: write

jobs:
  project:
    name: Project board
    runs-on: ubuntu-latest
    if: ${{ contains(github.repository, 'haos-jellyfin') }}
    steps:
      - name: Remove from 'Current Release' project
        uses: alex-page/github-project-automation-plus@303f24a24c67ce7adf565a07e96720faf126fe36 # v0.9.0
        if: >-
          (github.event.pull_request && !contains(github.event.pull_request.labels.*.name, 'stable backport')) ||
          (github.event.issue && github.event.issue.pull_request && !contains(github.event.issue.labels.*.name, 'stable backport'))
        continue-on-error: true
        with:
          project: Current Release
          action: delete
          column: In progress
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add to 'Release Next' project
        uses: alex-page/github-project-automation-plus@303f24a24c67ce7adf565a07e96720faf126fe36 # v0.9.0
        if: >-
          ((github.event.pull_request) ||
          (github.event.issue && github.event.issue.pull_request)) &&
          github.event.action == 'opened'
        continue-on-error: true
        with:
          project: Release Next
          column: In progress
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add to 'Current Release' project
        uses: alex-page/github-project-automation-plus@303f24a24c67ce7adf565a07e96720faf126fe36 # v0.9.0
        if: >-
          (github.event.pull_request && !contains(github.event.pull_request.labels.*.name, 'stable backport')) ||
          (github.event.issue && github.event.issue.pull_request && !contains(github.event.issue.labels.*.name, 'stable backport'))
        continue-on-error: true
        with:
          project: Current Release
          column: In progress
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check number of comments from the team member
        if: >-
          github.event.issue && github.event.issue.pull_request == null &&
          github.event.comment && github.event.comment.author_association == 'MEMBER'
        id: member_comments
        run: |
          echo "number=$(curl -s -H 'Authorization: token ${{ secrets.GITHUB_TOKEN }}' ${{ github.event.issue.comments_url }} | jq '.[] | select(.author_association == "MEMBER") | .author_association' | wc -l)" >> $GITHUB_OUTPUT

      - name: Move issue to needs triage
        uses: alex-page/github-project-automation-plus@303f24a24c67ce7adf565a07e96720faf126fe36 # v0.9.0
        if: >-
          github.event.issue && github.event.issue.pull_request == null &&
          github.event.comment && github.event.comment.author_association == 'MEMBER' &&
          steps.member_comments.outputs.number <= 1
        continue-on-error: true
        with:
          project: Issue Triage for Main Repo
          column: Needs triage
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add issue to triage project
        uses: alex-page/github-project-automation-plus@303f24a24c67ce7adf565a07e96720faf126fe36 # v0.9.0
        if: github.event.issue && github.event.issue.pull_request == null && github.event.action == 'opened'
        continue-on-error: true
        with:
          project: Issue Triage for Main Repo
          column: Pending response
          repo-token: ${{ secrets.GITHUB_TOKEN }}
